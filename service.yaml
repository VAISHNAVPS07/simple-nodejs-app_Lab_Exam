apiVersion: v1
kind: Service
metadata:
  name: simple-nodejs-service
  labels:
    app: simple-nodejs-app
spec:
  # Use LoadBalancer in cloud; change to ClusterIP or NodePort for other environments
  type: LoadBalancer
  selector:
    app: simple-nodejs-app
  ports:
    - name: http
      protocol: TCP
      port: 80        # external port
      targetPort: 3000  # container port
